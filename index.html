<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#00AEEF">
    <title>Blue Bottle Style Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // JS patch to completely resolve iOS double-tap zoom issues
      document.addEventListener('touchstart', function (event) {
        if (event.touches.length > 1) {
          event.preventDefault();
        }
      }, { passive: false });

      let lastTouchEnd = 0;
      document.addEventListener('touchend', function (event) {
        // Exclude all interactive elements to ensure their clicks are not affected
        const target = event.target;
        const isInteractive = target.tagName === 'BUTTON' || 
                           target.tagName === 'A' || 
                           target.tagName === 'INPUT' || 
                           target.tagName === 'SELECT' ||
                           target.closest('button') || // Ensure icons inside buttons are also clickable
                           target.closest('a');

        if (isInteractive) return; // Skip interception logic if it's a button or link

        const now = (new Date()).getTime();
        if (now - lastTouchEnd <= 300) {
          event.preventDefault(); // Only intercept double-tap zoom on pure background areas
        }
        lastTouchEnd = now;
      }, false);
    </script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'bb-blue': '#00AEEF',
              'bb-gray-light': '#F7F7F7',
              'bb-text': '#333333',
            },
            fontFamily: {
              sans: ['Inter', 'Noto Sans JP', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
      html {
        background-color: #00AEEF; /* Background color shown when pulling down */
        touch-action: manipulation; /* Disable double-tap zoom, remove click delay */
      }
      body {
        background-color: #ffffff; /* Maintain white background for content area */
        color: #333333;
        -webkit-font-smoothing: antialiased;
        touch-action: manipulation;
      }
      /* Enhance response speed for buttons and links */
      a, button {
        touch-action: manipulation;
      }
      .bb-button {
        transition: all 0.3s ease;
      }
      .bb-button:hover {
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
