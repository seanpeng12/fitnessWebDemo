<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#00AEEF">
    <title>Blue Bottle Style Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // 徹底解決 iOS 連點放大問題的 JS 補丁
      document.addEventListener('touchstart', function (event) {
        if (event.touches.length > 1) {
          event.preventDefault();
        }
      }, { passive: false });

      let lastTouchEnd = 0;
      document.addEventListener('touchend', function (event) {
        // 排除所有的互動元素，確保它們的點擊不受影響
        const target = event.target;
        const isInteractive = target.tagName === 'BUTTON' || 
                           target.tagName === 'A' || 
                           target.tagName === 'INPUT' || 
                           target.tagName === 'SELECT' ||
                           target.closest('button') || // 確保按鈕內的圖示也能按
                           target.closest('a');

        if (isInteractive) return; // 如果是按鈕或連結，直接跳過攔截邏輯

        const now = (new Date()).getTime();
        if (now - lastTouchEnd <= 300) {
          event.preventDefault(); // 只攔截純背景區域的連點放大
        }
        lastTouchEnd = now;
      }, false);
    </script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'bb-blue': '#00AEEF',
              'bb-gray-light': '#F7F7F7',
              'bb-text': '#333333',
            },
            fontFamily: {
              sans: ['Inter', 'Noto Sans JP', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
      html {
        background-color: #00AEEF; /* 下拉時露出的底色 */
        touch-action: manipulation; /* 停用連點兩下放大，移除點擊延遲 */
      }
      body {
        background-color: #ffffff; /* 內容區塊維持白色 */
        color: #333333;
        -webkit-font-smoothing: antialiased;
        touch-action: manipulation;
      }
      /* 針對按鈕與連結強化反應速度 */
      a, button {
        touch-action: manipulation;
      }
      .bb-button {
        transition: all 0.3s ease;
      }
      .bb-button:hover {
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
